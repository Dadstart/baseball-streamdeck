<!DOCTYPE html>
<html>

<head lang="en">
	<title>MLB Player Headshot</title>
	<meta charset="utf-8" />
	<script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
	<style>
		sdpi-select {
			--font-color: var(--input-bg-color);
		}

		html,
		body {
			background: transparent;
		}
	</style>
</head>

<body>
	<sdpi-item label="Team">
		<sdpi-select id="teamSelect" setting="team" placeholder="Select a team…">
			<optgroup label="American League East">
				<option value="110">BAL — Baltimore Orioles</option>
				<option value="111">BOS — Boston Red Sox</option>
				<option value="147">NYY — New York Yankees</option>
				<option value="139">TB — Tampa Bay Rays</option>
				<option value="141">TOR — Toronto Blue Jays</option>
			</optgroup>
			<optgroup label="American League Central">
				<option value="145">CWS — Chicago White Sox</option>
				<option value="114">CLE — Cleveland Guardians</option>
				<option value="116">DET — Detroit Tigers</option>
				<option value="118">KC — Kansas City Royals</option>
				<option value="142">MIN — Minnesota Twins</option>
			</optgroup>
			<optgroup label="American League West">
				<option value="133">ATH — Athletics</option>
				<option value="117">HOU — Houston Astros</option>
				<option value="108">LAA — Los Angeles Angels</option>
				<option value="136">SEA — Seattle Mariners</option>
				<option value="140">TEX — Texas Rangers</option>
			</optgroup>
			<optgroup label="National League East">
				<option value="144">ATL — Atlanta Braves</option>
				<option value="146">MIA — Miami Marlins</option>
				<option value="121">NYM — New York Mets</option>
				<option value="143">PHI — Philadelphia Phillies</option>
				<option value="120">WSH — Washington Nationals</option>
			</optgroup>
			<optgroup label="National League Central">
				<option value="112">CHC — Chicago Cubs</option>
				<option value="113">CIN — Cincinnati Reds</option>
				<option value="158">MIL — Milwaukee Brewers</option>
				<option value="134">PIT — Pittsburgh Pirates</option>
				<option value="138">STL — St. Louis Cardinals</option>
			</optgroup>
			<optgroup label="National League West">
				<option value="109">AZ — Arizona Diamondbacks</option>
				<option value="115">COL — Colorado Rockies</option>
				<option value="119">LAD — Los Angeles Dodgers</option>
				<option value="135">SD — San Diego Padres</option>
				<option value="137">SF — San Francisco Giants</option>
			</optgroup>
		</sdpi-select>
	</sdpi-item>

	<sdpi-item label="Player">
		<sdpi-select
			id="playerSelect"
			setting="playerId"
			placeholder="Select a team first…"
			disabled
		></sdpi-select>
	</sdpi-item>

	<sdpi-item label="Cache">
		<div style="display: flex; flex-direction: column; gap: 6px; width: 100%;">
			<button id="clearCacheButton" type="button">Clear cache</button>
			<small id="cacheStatusText" style="opacity: 0.8;"></small>
		</div>
	</sdpi-item>

	<sdpi-item style="display: none;">
		<sdpi-textfield id="cacheClearTokenBridge" setting="cacheClearToken"></sdpi-textfield>
	</sdpi-item>

	<script>
		const MLB_TEAM_ROSTER_API_BASE = "https://statsapi.mlb.com/api/v1/teams";
		const NUMERIC_ID_RE = /^\d+$/;
		const ONE_WEEK_MS = 7 * 24 * 60 * 60 * 1000;
		const ROSTER_CACHE_KEY_PREFIX = "mlbPlayerHeadshotRoster:";
		const teamSelect = document.getElementById("teamSelect");
		const playerSelect = document.getElementById("playerSelect");
		const clearCacheButton = document.getElementById("clearCacheButton");
		const cacheStatusText = document.getElementById("cacheStatusText");
		const cacheClearTokenBridge = document.getElementById("cacheClearTokenBridge");
		let rosterAbortController = null;

		function selectValue(el) {
			return String(el?.value ?? "").trim();
		}

		function setSelectValue(el, value) {
			el.value = value;
		}

		function dispatchSelectChange(el) {
			el.dispatchEvent(new Event("change", { bubbles: true }));
		}

		function statusMessage(text) {
			cacheStatusText.textContent = text;
			if (text === "") {
				return;
			}
			setTimeout(() => {
				if (cacheStatusText.textContent === text) {
					cacheStatusText.textContent = "";
				}
			}, 2500);
		}

		function makeOption(value, label) {
			const opt = document.createElement("option");
			opt.value = value;
			opt.textContent = label;
			return opt;
		}

		function clearPlayerSelect(placeholder, shouldDisable) {
			playerSelect.replaceChildren(makeOption("", placeholder));
			setSelectValue(playerSelect, "");
			playerSelect.disabled = shouldDisable;
		}

		function setPlayerSelection(value) {
			const current = selectValue(playerSelect);
			setSelectValue(playerSelect, value);
			if (current !== value) {
				dispatchSelectChange(playerSelect);
			}
		}

		function playerLabelFromRosterRow(row) {
			const jersey =
				typeof row?.jerseyNumber === "string" && row.jerseyNumber.trim() !== ""
					? `#${row.jerseyNumber.trim()} `
					: "";
			const position =
				typeof row?.position?.abbreviation === "string" &&
				row.position.abbreviation.trim() !== ""
					? ` — ${row.position.abbreviation.trim()}`
					: "";
			return `${jersey}${row.person.fullName}${position}`;
		}

		function rosterStorageKey(teamId) {
			return `${ROSTER_CACHE_KEY_PREFIX}${teamId}`;
		}

		function readRosterCache(teamId) {
			try {
				const raw = localStorage.getItem(rosterStorageKey(teamId));
				if (raw === null || raw === "") {
					return null;
				}
				const parsed = JSON.parse(raw);
				const cachedAtMs = Number(parsed?.cachedAtMs);
				const playersRaw = Array.isArray(parsed?.players) ? parsed.players : null;
				if (!Number.isFinite(cachedAtMs) || playersRaw === null) {
					localStorage.removeItem(rosterStorageKey(teamId));
					return null;
				}
				if (Date.now() - cachedAtMs > ONE_WEEK_MS) {
					localStorage.removeItem(rosterStorageKey(teamId));
					return null;
				}
				const players = playersRaw
					.map((p) => ({
						id: String(p?.id ?? "").trim(),
						label: String(p?.label ?? "").trim(),
					}))
					.filter((p) => p.id !== "" && p.label !== "");
				if (players.length === 0 && playersRaw.length > 0) {
					localStorage.removeItem(rosterStorageKey(teamId));
					return null;
				}
				return players;
			} catch {
				localStorage.removeItem(rosterStorageKey(teamId));
				return null;
			}
		}

		function writeRosterCache(teamId, players) {
			try {
				localStorage.setItem(
					rosterStorageKey(teamId),
					JSON.stringify({
						cachedAtMs: Date.now(),
						players,
					}),
				);
			} catch {
				// Ignore quota errors; this cache is best-effort only.
			}
		}

		function clearAllRosterCache() {
			const keysToDelete = [];
			for (let i = 0; i < localStorage.length; i += 1) {
				const key = localStorage.key(i);
				if (typeof key === "string" && key.startsWith(ROSTER_CACHE_KEY_PREFIX)) {
					keysToDelete.push(key);
				}
			}
			for (const key of keysToDelete) {
				localStorage.removeItem(key);
			}
		}

		function publishCacheClearSignal() {
			const token = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
			cacheClearTokenBridge.value = token;
			cacheClearTokenBridge.dispatchEvent(new Event("input", { bubbles: true }));
			cacheClearTokenBridge.dispatchEvent(new Event("change", { bubbles: true }));
		}

		function applyPlayersToSelect(players, selectedPlayerId, previousPlayerId, selectionClearedBeforeFetch) {
			const nextOptions = [
				makeOption("", "Select a player…"),
				...players.map((p) => makeOption(p.id, p.label)),
			];
			playerSelect.replaceChildren(...nextOptions);
			playerSelect.disabled = players.length === 0;

			const canKeepSelection =
				selectedPlayerId !== "" &&
				players.some((p) => p.id === selectedPlayerId);
			if (canKeepSelection) {
				setSelectValue(playerSelect, selectedPlayerId);
				return;
			}

			setSelectValue(playerSelect, "");
			if (previousPlayerId !== "" && !selectionClearedBeforeFetch) {
				dispatchSelectChange(playerSelect);
			}
		}

		async function loadPlayersForTeam(teamId, options) {
			if (rosterAbortController !== null) {
				rosterAbortController.abort();
			}
			rosterAbortController = new AbortController();
			const previousPlayerId = selectValue(playerSelect);
			const selectionClearedBeforeFetch =
				!options?.preserveExistingSelection && previousPlayerId !== "";

			if (!NUMERIC_ID_RE.test(teamId)) {
				clearPlayerSelect("Select a team first…", true);
				if (previousPlayerId !== "") {
					dispatchSelectChange(playerSelect);
				}
				return;
			}

			if (selectionClearedBeforeFetch) {
				setPlayerSelection("");
			}
			const selectedPlayerId = options?.preserveExistingSelection
				? previousPlayerId
				: "";
			const shouldUseCache = !options?.forceRefresh;
			const cachedPlayers = shouldUseCache ? readRosterCache(teamId) : null;
			if (cachedPlayers !== null) {
				applyPlayersToSelect(
					cachedPlayers,
					selectedPlayerId,
					previousPlayerId,
					selectionClearedBeforeFetch,
				);
				return;
			}
			clearPlayerSelect("Loading players…", true);

			try {
				const q = new URLSearchParams({ rosterType: "active" });
				const url = `${MLB_TEAM_ROSTER_API_BASE}/${teamId}/roster?${q.toString()}`;
				const res = await fetch(url, { signal: rosterAbortController.signal });
				if (!res.ok) {
					throw new Error(`HTTP ${res.status}`);
				}
				const body = await res.json();
				const players = Array.isArray(body?.roster)
					? body.roster
						.filter((row) => {
							const id = Number(row?.person?.id);
							const fullName = String(row?.person?.fullName ?? "").trim();
							return Number.isFinite(id) && fullName !== "";
						})
						.map((row) => ({
							id: String(Number(row.person.id)),
							sortName: String(row.person.fullName).trim(),
							label: playerLabelFromRosterRow(row),
						}))
						.sort((a, b) =>
							a.sortName.localeCompare(b.sortName, "en", {
								sensitivity: "base",
							}),
						)
					: [];

				writeRosterCache(teamId, players);
				applyPlayersToSelect(
					players,
					selectedPlayerId,
					previousPlayerId,
					selectionClearedBeforeFetch,
				);
			} catch (err) {
				if (err instanceof DOMException && err.name === "AbortError") {
					return;
				}
				clearPlayerSelect("Roster unavailable", true);
				if (previousPlayerId !== "" && !selectionClearedBeforeFetch) {
					dispatchSelectChange(playerSelect);
				}
			}
		}

		teamSelect.addEventListener("change", () => {
			void loadPlayersForTeam(selectValue(teamSelect), {
				preserveExistingSelection: false,
			});
		});

		clearCacheButton.addEventListener("click", () => {
			clearAllRosterCache();
			publishCacheClearSignal();
			statusMessage("Cache cleared");
			void loadPlayersForTeam(selectValue(teamSelect), {
				preserveExistingSelection: true,
				forceRefresh: true,
			});
		});

		function initPlayersFromSettings(retriesLeft) {
			const teamId = selectValue(teamSelect);
			if (NUMERIC_ID_RE.test(teamId) || retriesLeft <= 0) {
				void loadPlayersForTeam(teamId, { preserveExistingSelection: true });
				return;
			}
			setTimeout(() => initPlayersFromSettings(retriesLeft - 1), 100);
		}

		clearPlayerSelect("Select a team first…", true);
		initPlayersFromSettings(8);
	</script>
</body>

</html>
